<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - ShopPulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <a href="{{ url_for('shop') }}" class="logo">ShopPulse</a>
    <div class="navbar-right">
        <a href="/shop" class="nav-link-back">← Back to Shop</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <h2 class="page-title">My Orders</h2>

    {% if orders %}
    <table class="orders-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Product</th>
                <th>Price</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
        {% for o in orders %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ o.product }}</td>
                <td>${{ o.price }}</td>
                <td>{{ o.date[:16] }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    {% else %}
    <div class="empty">
        <h2>No orders yet</h2>
        <p>Head to the shop and buy something!</p>
        <a href="/shop" class="buy-btn btn-block-top">Go Shopping</a>
    </div>
    {% endif %}
</div>
</body>
</html>
